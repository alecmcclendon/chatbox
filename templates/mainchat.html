<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Room: {{ room }}</title>

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/mainchat.css') }}"
  />

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

  <script>
    const socket = io();
    const username = "{{ username }}";
    const room = "{{ room }}";

    const allRooms = {{ rooms|tojson }};
    const mainRoom = allRooms[0];
    const roomUrlTemplate = "{{ url_for('mainchat', room='__ROOM__') }}";
  </script>
</head>

<body>
  <div id="chat-wrapper">
    <div class="settings-area">
      <button id="settings-btn" aria-label="Settings" type="button">
        <svg height="200" width="200" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
          <path d="m11.469.969l-.563 3.562A8.704 8.704 0 0 0 8.5 5.5L5.562 3.406L3.438 5.531L5.5 8.47a8.767 8.767 0 0 0-1 2.406l-3.531.594v3l3.531.625a8.683 8.683 0 0 0 1 2.406l-2.094 2.938l2.125 2.125L8.47 20.5a8.717 8.717 0 0 0 2.406.969l.594 3.562h3l.656-3.562a8.627 8.627 0 0 0 2.375-1l2.969 2.093l2.125-2.125L20.47 17.5c.438-.73.79-1.526 1-2.375l3.562-.656v-3l-3.562-.594a8.746 8.746 0 0 0-1-2.375l2.093-2.969l-2.125-2.125L17.5 5.531a8.767 8.767 0 0 0-2.406-1L14.469.97h-3zM13 6.469A6.535 6.535 0 0 1 19.531 13A6.535 6.535 0 0 1 13 19.531A6.536 6.536 0 0 1 6.469 13A6.536 6.536 0 0 1 13 6.469zm0 1.593A4.949 4.949 0 0 0 8.062 13A4.949 4.949 0 0 0 13 17.938A4.949 4.949 0 0 0 17.938 13A4.949 4.949 0 0 0 13 8.062zm-.031 2.876c1.146 0 2.094.915 2.094 2.062c0 1.146-.948 2.063-2.094 2.063A2.054 2.054 0 0 1 10.906 13c0-1.147.917-2.063 2.063-2.063z" fill="currentColor"/>
        </svg>
      </button>

      <div id="settings-menu">
        <button id="room-change-btn" type="button">ルーム変更</button>
        <button id="username-change-btn" type="button">ユーザー名変更</button>
        <button id="logout-btn" type="button">ログアウト</button>
        <button id="delete-account" type="button">アカウントを削除</button>
      </div>
    </div>

    <div id="chat-container">
      <h1 class="chat-header">
        <img
          src="{{ url_for('static', filename='media/chatbox.png') }}"
          alt="ChatBox"
        >

        <nav class="room-tabs" id="room-tabs"></nav>
      </h1>

      <div id="messages"></div>

      <div class="input-area">
        <input
          id="input"
          placeholder="メッセージを入力…"
          autofocus
          autocomplete="off"
        />
        <button id="send-btn" type="button">送信</button>
      </div>
    </div>

    <div id="user-list">
      <h3>オンラインユーザー</h3>
      <ul id="users"></ul>
    </div>
  </div>

  <div id="room-modal" class="room-modal" aria-hidden="true">
    <div class="room-modal-box">
      <div class="room-modal-header">
        <h2>ルーム変更</h2>
        <button id="room-modal-close" type="button">
          <svg height="25" width="25" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="m4.818 4.111l-.707.707a.5.5 0 0 0 0 .707L6.586 8L4.11 10.475a.5.5 0 0 0 0 .707l.707.707a.5.5 0 0 0 .707 0L8 9.414l2.475 2.475a.5.5 0 0 0 .707 0l.707-.707a.5.5 0 0 0 0-.707L9.414 8l2.475-2.475a.5.5 0 0 0 0-.707l-.707-.707a.5.5 0 0 0-.707 0L8 6.586L5.525 4.11a.5.5 0 0 0-.707 0" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <div id="room-list"></div>
    </div>
  </div>

  <div id="username-modal" class="room-modal" aria-hidden="true">
    <div class="room-modal-box">
      <div class="room-modal-header">
        <h2>ユーザー名変更</h2>

        <button id="username-modal-close" type="button" aria-label="閉じる">
          <svg height="25" width="25" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="m4.818 4.111l-.707.707a.5.5 0 0 0 0 .707L6.586 8L4.11 10.475a.5.5 0 0 0 0 .707l.707.707a.5.5 0 0 0 .707 0L8 9.414l2.475 2.475a.5.5 0 0 0 .707 0l.707-.707a.5.5 0 0 0 0-.707L9.414 8l2.475-2.475a.5.5 0 0 0 0-.707l-.707-.707a.5.5 0 0 0-.707 0L8 6.586L5.525 4.11a.5.5 0 0 0-.707 0" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <p class="delete-modal-text">
        新しいユーザー名と現在のパスワードを入力してください。
      </p>

      <input
        id="new-username"
        class="delete-input"
        type="text"
        placeholder="新しいユーザー名"
        autocomplete="username"
      />

      <input
        id="username-password"
        class="delete-input"
        type="password"
        placeholder="現在のパスワード"
        autocomplete="current-password"
      />

      <p id="username-error" class="delete-error"></p>

      <div class="delete-modal-actions">
        <button id="username-save-btn" type="button">変更</button>
        <button id="username-cancel-btn" type="button">戻る</button>
      </div>
    </div>
  </div>

  <div id="logout-modal" class="room-modal" aria-hidden="true">
    <div class="room-modal-box">
      <div class="room-modal-header">
        <h2>ログアウト</h2>
      </div>

      <p class="delete-modal-text">
        ログアウトしますか？
      </p>

      <div class="delete-modal-actions">
        <button id="logout-confirm-btn" type="button" class="danger-btn">ログアウト</button>
        <button id="logout-cancel-btn" type="button">戻る</button>
      </div>
    </div>
  </div>

  <div id="delete-modal" class="room-modal" aria-hidden="true">
    <div class="room-modal-box">
      <div class="room-modal-header">
        <h2>アカウント削除</h2>

        <button id="delete-modal-close" type="button" aria-label="閉じる">
          <svg height="25" width="25" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="m4.818 4.111l-.707.707a.5.5 0 0 0 0 .707L6.586 8L4.11 10.475a.5.5 0 0 0 0 .707l.707.707a.5.5 0 0 0 .707 0L8 9.414l2.475 2.475a.5.5 0 0 0 .707 0l.707-.707a.5.5 0 0 0 0-.707L9.414 8l2.475-2.475a.5.5 0 0 0 0-.707l-.707-.707a.5.5 0 0 0-.707 0L8 6.586L5.525 4.11a.5.5 0 0 0-.707 0" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <p class="delete-modal-text">
        アカウントを削除するには、ユーザー名とパスワードを入力してください。
      </p>

      <input
        id="delete-username"
        class="delete-input"
        type="text"
        placeholder="ユーザー名"
        autocomplete="username"
      />

      <input
        id="delete-password"
        class="delete-input"
        type="password"
        placeholder="パスワード"
        autocomplete="current-password"
      />

      <p id="delete-error" class="delete-error"></p>

      <div class="delete-modal-actions">
        <button id="delete-next-btn" type="button">次へ</button>
        <button id="delete-cancel-btn" type="button">戻る</button>
      </div>
    </div>
  </div>

  <div id="delete-confirm-modal" class="room-modal" aria-hidden="true">
    <div class="room-modal-box">
      <div class="room-modal-header">
        <h2>本当に削除しますか？</h2>
      </div>

      <p class="delete-modal-text danger">
        この操作は取り消せません。アカウントを完全に削除します。
      </p>

      <div class="delete-modal-actions">
        <button id="delete-final-btn" type="button" class="danger-btn">削除</button>
        <button id="delete-back-btn" type="button">戻る</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/mainchat.js') }}"></script>
</body>
</html>
